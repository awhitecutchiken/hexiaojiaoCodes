<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>减数分裂Ⅰ前期互换模拟</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        
        #simulation-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #e6f7ff;
            border: 2px solid #333;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        #cell {
            position: absolute;
            width: 600px;
            height: 500px;
            top: 50px;
            left: 100px;
            border: 2px solid #666;
            border-radius: 50%;
            background-color: #fff;
        }
        
        .chromosome {
            position: absolute;
            width: 8px;
            border-radius: 4px;
            z-index: 2;
        }
        
        .chromatid {
            position: absolute;
            width: 8px;
            border-radius: 4px;
        }
        
        .gene {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            text-align: center;
            font-size: 8px;
            line-height: 12px;
            transform: translateX(-2px);
        }
        
        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 800px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        #info-panel {
            margin-top: 20px;
            width: 800px;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .stage-indicator {
            margin-top: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .nucleus {
            position: absolute;
            width: 500px;
            height: 400px;
            top: 50px;
            left: 50px;
            border: 1px dashed #999;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>减数分裂Ⅰ前期互换模拟</h1>
    <div id="simulation-container">
        <div id="cell">
            <div class="nucleus" id="nucleus"></div>
        </div>
    </div>
    
    <div id="controls">
        <button id="start-btn">开始模拟</button>
        <button id="pause-btn" disabled>暂停</button>
        <button id="reset-btn">重置</button>
        <label for="speed">速度: </label>
        <select id="speed">
            <option value="slow">慢</option>
            <option value="medium" selected>中</option>
            <option value="fast">快</option>
        </select>

        <div class="stage-indicator" id="stage">阶段: 准备就绪</div>
    </div>

    <script>
        // 全局变量
        let chromosomes = [];
        let isRunning = false;
        let isPaused = false;
        let animationId = null;
        let currentStage = 0;
        let stageProgress = 0;
        let speedFactor = 1;
        let changged = false;

        // 初始化
        function init() {
            resetSimulation();
            
            // 事件监听
            document.getElementById('start-btn').addEventListener('click', startSimulation);
            document.getElementById('pause-btn').addEventListener('click', pauseSimulation);
            document.getElementById('reset-btn').addEventListener('click', resetSimulation);
            document.getElementById('speed').addEventListener('change', function() {
                switch(this.value) {
                    case 'slow': speedFactor = 0.5; break;
                    case 'medium': speedFactor = 1; break;
                    case 'fast': speedFactor = 2; break;
                }
            });
        }
        
        // 创建染色体
        function createChromosomes() {
            const container = document.getElementById('cell');
            container.innerHTML = '<div class="nucleus" id="nucleus"></div>';
            
            chromosomes = [];
            // 创建2对同源染色体（父方和母方）
            // 第一对同源染色体
            chromosomes.push(createChromosomePair(150, 200, 120, 'blue'));  // 父方
            chromosomes.push(createChromosomePair(450, 200, 120, 'red'));   // 母方
            
            // 第二对同源染色体
            chromosomes.push(createChromosomePair(180, 300, 90, 'blue'));   // 父方
            chromosomes.push(createChromosomePair(420, 300, 90, 'red'));    // 母方
        }
        
        // 创建一对同源染色体（复制后形成两条姐妹染色单体）
        function createChromosomePair(x, y, length, color) {
            const container = document.getElementById('cell');
            const chromosome = document.createElement('div');
            chromosome.className = 'chromosome';
            chromosome.style.height = `${length}px`;
            chromosome.style.left = `${x}px`;
            chromosome.style.top = `${y}px`;
            chromosome.style.backgroundColor = color;
            
            // 创建两条姐妹染色单体
            const chromatid1 = document.createElement('div');
            chromatid1.className = 'chromatid';
            chromatid1.style.height = `${length}px`;
            chromatid1.style.left = '0px';
            chromatid1.style.top = '0px';
            chromatid1.style.backgroundColor = color;
            chromatid1.dataset.id = '1';
            
            const chromatid2 = document.createElement('div');
            chromatid2.className = 'chromatid';
            chromatid2.style.height = `${length}px`;
            chromatid2.style.left = '10px';
            chromatid2.style.top = '0px';
            chromatid2.style.backgroundColor = color;
            chromatid2.dataset.id = '2';
            
            chromosome.appendChild(chromatid1);
            chromosome.appendChild(chromatid2);
            
            // 添加基因标记
            addGenes(chromatid1, color);
            addGenes(chromatid2, color);
            
            container.appendChild(chromosome);
            
            return {
                element: chromosome,
                x: x,
                y: y,
                targetX: x,
                targetY: y,
                length: length,
                color: color,
                rotation: 0,
                targetRotation: 0,
                chromatids: [chromatid1, chromatid2]
            };
        }
        
        // 为染色单体添加基因标记
        function addGenes(chromatid, color) {
            const genePositions = [0.3, 0.5, 0.7];  // 基因在染色单体上的相对位置
            const geneLabels = ['A', 'B', 'C'];
            const altGeneLabels = ['a', 'b', 'c'];
            
            // 随机决定是否使用等位基因（父方/母方）
            const useAlt = color === 'red'; // 母方染色体使用等位基因
            
            genePositions.forEach((pos, index) => {
                const gene = document.createElement('div');
                gene.className = 'gene';
                gene.style.top = `${pos * 100}%`;
                gene.style.backgroundColor = color === 'blue' ? '#3498db' : '#e74c3c';
                gene.style.color = 'white';
                gene.textContent = useAlt ? altGeneLabels[index] : geneLabels[index];
                gene.dataset.name = useAlt ? altGeneLabels[index] : geneLabels[index];
                chromatid.appendChild(gene);
            });
        }
        
        // 开始模拟
        function startSimulation() {
            if (isPaused) {
                isPaused = false;
            } else {
                resetSimulation();
                createChromosomes();
                currentStage = 0;
                stageProgress = 0;
            }
            
            isRunning = true;
            changged = false;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('pause-btn').disabled = false;
            animate();
        }
        
        // 暂停模拟
        function pauseSimulation() {
            isPaused = true;
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            document.getElementById('start-btn').disabled = false;
            document.getElementById('pause-btn').disabled = true;
        }
        
        // 重置模拟
        function resetSimulation() {
            isRunning = false;
            isPaused = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            document.getElementById('cell').innerHTML = '<div class="nucleus" id="nucleus"></div>';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('pause-btn').disabled = true;
            
            currentStage = 0;
            stageProgress = 0;
            document.getElementById('stage').textContent = `阶段: 准备就绪`;
        }
        
        // 动画循环
        function animate() {
            if (!isRunning) return;
            
            stageProgress += 0.005 * speedFactor;
            
            // 处理各个阶段
            switch(currentStage) {
                case 0:  // 间期 (DNA复制)
                    handleInterphase();
                    break;
                case 1:  // 细线期
                    handleLeptotene();
                    break;
                case 2:  // 偶线期 (联会)
                    handleZygotene();
                    break;
                case 3:  // 粗线期 (四分体)
                    handlePachytene();
                    break;
                case 4:  // 双线期 (互换)
                    handleDiplotene();
                    break;
                case 5:  // 终变期
                    handleDiakinesis();
                    break;
                default:
                    // 模拟结束
                    isRunning = false;
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('pause-btn').disabled = true;
                    return;
            }
            
            // 更新染色体位置和状态
            updateChromosomes();
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 处理间期
        function handleInterphase() {
            if (stageProgress >= 1) {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 处理细线期
        function handleLeptotene() {
            if (stageProgress < 1) {
                // 轻微晃动，模拟染色质螺旋化
                chromosomes.forEach((chrom, index) => {
                    chrom.targetRotation = Math.sin(Date.now() * 0.001 + index) * 5;
                });
            } else {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 处理偶线期（联会）
        function handleZygotene() {
            if (stageProgress < 1) {
                // 同源染色体配对（第1对和第3对是父方，第2对和第4对是母方）
                // 第一对同源染色体配对
                chromosomes[0].targetX = 300;
                chromosomes[0].targetY = 200;
                chromosomes[1].targetX = 320;
                chromosomes[1].targetY = 200;
                
                // 第二对同源染色体配对
                chromosomes[2].targetX = 300;
                chromosomes[2].targetY = 320;
                chromosomes[3].targetX = 320;
                chromosomes[3].targetY = 320;
            } else {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 处理粗线期（四分体）
        function handlePachytene() {
            if (stageProgress < 1) {
                // 同源染色体进一步靠近
                chromosomes[1].targetX = 310;
                chromosomes[3].targetX = 310;
            } else {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 处理双线期（互换）
        function handleDiplotene() {
            if (stageProgress < 0.3) {
                // 准备互换，轻微旋转
                chromosomes[0].targetRotation = -5;
                chromosomes[1].targetRotation = 5;
                chromosomes[2].targetRotation = -5;
                chromosomes[3].targetRotation = 5;
            } else if (stageProgress < 0.7 && stageProgress >= 0.3) {
                // 执行互换（随机概率）
                if (!changged){
                    performCrossover(chromosomes[0].chromatids[1], chromosomes[1].chromatids[0], 0.6);
                    performCrossover(chromosomes[2].chromatids[1], chromosomes[3].chromatids[0], 0.6);
                    changged = true;
                }
            } else if (stageProgress >= 0.7) {
                // 互换后恢复
                chromosomes[0].targetRotation = 0;
                chromosomes[1].targetRotation = 0;
                chromosomes[2].targetRotation = 0;
                chromosomes[3].targetRotation = 0;
            }
            
            if (stageProgress >= 1) {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 处理终变期
        function handleDiakinesis() {
            if (stageProgress < 1) {
                // 同源染色体稍微分离，核膜开始解体
                chromosomes[1].targetX = 320;
                chromosomes[3].targetX = 320;
                
                // 核膜逐渐消失
                const nucleus = document.getElementById('nucleus');
                nucleus.style.opacity = 1 - stageProgress;
            } else {
                stageProgress = 0;
                currentStage++;
            }
        }
        
        // 执行互换
        function performCrossover(chromatid1, chromatid2, position) {
            // 获取交叉位置的基因
            const genes1 = Array.from(chromatid1.getElementsByClassName('gene'));
            const genes2 = Array.from(chromatid2.getElementsByClassName('gene'));
            
            // 找到交叉点位置的基因
            let crossGene1 = null;
            let crossIndex1 = -1;
            
            genes1.forEach((gene, index) => {
                const pos = parseFloat(gene.style.top) / 100;
                if (pos >= position && (crossGene1 === null || pos < parseFloat(crossGene1.style.top) / 100)) {
                    crossGene1 = gene;
                    crossIndex1 = index;
                }
            });
            
            let crossGene2 = null;
            let crossIndex2 = -1;
            
            genes2.forEach((gene, index) => {
                const pos = parseFloat(gene.style.top) / 100;
                if (pos >= position && (crossGene2 === null || pos < parseFloat(crossGene2.style.top) / 100)) {
                    crossGene2 = gene;
                    crossIndex2 = index;
                }
            });
            
            // 交换交叉点上方的基因
            if (crossGene1 && crossGene2) {
                // 记录要交换的基因
                const genesToSwap1 = genes1.slice(crossIndex1);
                const genesToSwap2 = genes2.slice(crossIndex2);
                
                // 交换基因
                genesToSwap1.forEach(gene => {
                    const clone = gene.cloneNode(true);
                    chromatid2.appendChild(clone);
                    gene.remove();
                });
                
                genesToSwap2.forEach(gene => {
                    const clone = gene.cloneNode(true);
                    chromatid1.appendChild(clone);
                    gene.remove();
                });
                
                // 添加交叉效果动画
                const crossMarker = document.createElement('div');
                crossMarker.style.position = 'absolute';
                crossMarker.style.width = '20px';
                crossMarker.style.height = '20px';
                crossMarker.style.border = '2px solid #ff9800';
                crossMarker.style.borderRadius = '50%';
                crossMarker.style.zIndex = '10';
                crossMarker.style.left = `${parseInt(chromatid1.parentElement.style.left) + 5}px`;
                crossMarker.style.top = `${parseInt(chromatid1.parentElement.style.top) + position * parseInt(chromatid1.style.height) - 10}px`;
                crossMarker.style.animation = 'pulse 1s infinite';
                
                document.head.insertAdjacentHTML('beforeend', `
                    <style>
                        @keyframes pulse {
                            0% { transform: scale(1); opacity: 1; }
                            50% { transform: scale(1.2); opacity: 0.7; }
                            100% { transform: scale(1); opacity: 1; }
                        }
                    </style>
                `);
                
                document.getElementById('cell').appendChild(crossMarker);
                
                // 3秒后移除标记
                setTimeout(() => {
                    crossMarker.remove();
                }, 3000);
            }
        }
        
        // 更新染色体位置和状态
        function updateChromosomes() {
            chromosomes.forEach(chrom => {
                // 平滑移动到目标位置
                chrom.x += (chrom.targetX - chrom.x) * 0.1;
                chrom.y += (chrom.targetY - chrom.y) * 0.1;
                
                // 平滑旋转到目标角度
                chrom.rotation += (chrom.targetRotation - chrom.rotation) * 0.1;
                
                // 更新DOM元素
                chrom.element.style.left = `${chrom.x}px`;
                chrom.element.style.top = `${chrom.y}px`;
                chrom.element.style.transform = `rotate(${chrom.rotation}deg)`;
            });
        }
        
        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
